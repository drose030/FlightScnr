name: Deploy WebFlasher

# Redeploy installer UI only (firmware is bundled by the Release workflow).
on:
  push:
    branches:
      - master
      - main
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
      - ".github/scripts/bundle-webflasher-firmware.sh"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download latest release firmware
        env:
          MERGED_ASSET: FlightScnr-tencoder-pro-merged.bin
          APP_ASSET: FlightScnr-tencoder-pro-app.bin
          ARCHIVE_COUNT: "12"
        run: |
          set -euo pipefail
          chmod +x .github/scripts/bundle-webflasher-firmware.sh
          .github/scripts/bundle-webflasher-firmware.sh

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
