; LilyGO T-Encoder Pro (ESP32-S3, 390×390 AMOLED QSPI, dual panel auto-detect)

[platformio]
; `pio run` / the IDE build button builds the firmware only. The native env is
; a host-only Unity test target (no main() outside tests) — run via `pio test`.
default_envs = tencoder-pro

[env:tencoder-pro]
platform = espressif32@6.5.0
board = esp32s3_flash_16MB
framework = arduino
monitor_speed = 115200
upload_speed = 460800
boards_dir = boards
lib_dir = lib
extra_scripts =
  pre:scripts/generate_icao_types.py
  pre:scripts/generate_airports.py
  pre:scripts/generate_airline_logos.py
  pre:scripts/generate_aircraft_icons.py
  post:scripts/merge_firmware.py

board_build.arduino.memory_type = qio_opi
board_build.arduino.partitions = default_16MB.csv
board_upload.flash_size = 16MB
board_build.sdkconfig_options =
  CONFIG_ARDUINO_LOOP_STACK_SIZE=16384

build_flags =
  -Wall
  -D CONFIG_ARDUINO_LOOP_STACK_SIZE=16384
  -D CORE_DEBUG_LEVEL=1
  -D BOARD_HAS_PSRAM
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D ARDUINO_RUNNING_CORE=1
  -D ARDUINO_EVENT_RUNNING_CORE=0
  ; Panel: auto-detect at boot (I2C touch probe, saved to NVS).
  ; Override: -D FLIGHTSCNR_PANEL_DXQ or -D FLIGHTSCNR_PANEL_TFD12
  -D WM_NODEBUG
  -D WM_MDNS
  -D WEBSERVER_MAX_POST_ARGS=64
  -I include/hardware

lib_deps =
  tzapu/WiFiManager@^2.0.17
  bblanchon/ArduinoJson@^7.4.2
  bitbank2/AnimatedGIF@^2.1.1
  bitbank2/JPEGDEC@^1.8.0

; Host-only unit tests (Unity). Builds just the hardware-free parse seam,
; no Arduino/ESP dependencies.
[env:native]
platform = native
test_framework = unity
lib_deps = bblanchon/ArduinoJson@^7.4.2
build_flags = -std=gnu++17 -Iinclude
build_src_filter = +<services/adsbdb_parse.cpp>
test_build_src = yes

